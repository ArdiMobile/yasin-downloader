<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YasinG - High Speed Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #2d6df6; --dark: #1a1d23; --bg: #f8f9fa; --text: #333; }
        body { font-family: 'Inter', sans-serif; margin: 0; color: var(--text); background: white; }
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 8%; border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; background: white; z-index: 100; }
        .logo { font-size: 26px; font-weight: 900; color: var(--blue); text-decoration: none; }
        .hero { background: var(--dark); color: white; padding: 80px 20px; text-align: center; }
        .search-area { max-width: 600px; margin: 20px auto; display: flex; background: white; padding: 5px; border-radius: 50px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .search-area input { flex: 1; border: none; padding: 12px 20px; outline: none; font-size: 16px; border-radius: 50px; }
        .btn-dl { background: var(--blue); color: white; border: none; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; }
        #loader { display: none; margin: 20px auto; border: 4px solid #f3f3f3; border-top: 4px solid var(--blue); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(3600deg); } }
        #resultArea { display: none; max-width: 500px; margin: 20px auto; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        video { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        .dl-btn-final { display: inline-block; background: var(--blue); color: white; padding: 12px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/" class="logo">YasinG</a>
    </nav>

    <section class="hero">
        <h1>Facebook Video Downloader</h1>
        <div class="search-area">
            <input type="text" id="urlInput" placeholder="Paste link here...">
            <button class="btn-dl" onclick="startDownload()"><i class="fas fa-download"></i></button>
        </div>
        <div id="loader"></div>
    </section>

    <div id="resultArea">
        <h3 id="videoTitle"></h3>
        <video id="videoPlayer" controls></video>
        <div id="dlLinks"></div>
        <button onclick="location.reload()" style="margin-top:15px; cursor:pointer; border:none; background:none; color:gray;">Download Another</button>
    </div>

   
        <script>
    function toggleMenu() { document.getElementById('navLinks').classList.toggle('active'); }
    function toggleFaq(el) { el.classList.toggle('active'); }

    async function startDownload() {
        const urlInput = document.getElementById('urlInput').value;
        const loader = document.getElementById('loader');
        const resultArea = document.getElementById('resultArea');
        const dlLinks = document.getElementById('dlLinks');
        const videoPlayer = document.getElementById('videoPlayer');

        if (!urlInput) return alert("Please enter a link!");
        
        loader.style.display = "block";
        resultArea.style.display = "none";

        try {
            const response = await fetch(`/info?url=${encodeURIComponent(urlInput)}`);
            const data = await response.json();
            loader.style.display = "none";

            if (data.error) throw new Error(data.error);

            resultArea.style.display = "block";
            let html = `<h3>${data.title}</h3>`;
            
            data.formats.forEach(f => {
                html += `
                    <a href="${f.url}" target="_blank" download 
                       style="display:block; background:#2d6df6; color:white; padding:12px; margin:10px 0; border-radius:50px; text-decoration:none; font-weight:bold;">
                       Download ${f.quality} (.${f.ext})
                    </a>`;
            });

            dlLinks.innerHTML = html;
            if (data.formats.length > 0) videoPlayer.src = data.formats[0].url;
            resultArea.scrollIntoView({ behavior: 'smooth' });

        } catch (err) {
            loader.style.display = "none";
            alert("Error: " + err.message);
        }
    }

    </script>
</body>
</html>
