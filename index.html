<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yasing - Social Media Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #2d6df6;
            --bg-dark: #0f1115;
            --card-bg: #1a1d23;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-blue);
            font-style: italic;
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 20px;
            text-align: center;
        }

        h1 { font-size: 28px; margin-bottom: 25px; }

        .input-group {
            background: #252932;
            padding: 5px;
            border-radius: 12px;
            display: flex;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px;
            outline: none;
        }

        .btn-main {
            background: var(--primary-blue);
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        #results { margin-top: 20px; }

        .download-btn {
            display: block;
            background: #252932;
            color: white;
            text-decoration: none;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            transition: 0.3s;
            border: 1px solid #333;
        }

        .download-btn:hover { background: #303642; }

        .thumbnail {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .how-to {
            margin-top: 40px;
            width: 90%;
            max-width: 800px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .step-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            font-size: 12px;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-blue);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 10px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Yasing</div>
        <i class="fas fa-bars"></i>
    </div>

    <div class="container">
        <h1>ቪዲዮ ማውረጃ</h1>
        
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="ሊንኩን እዚህ ያስገቡ...">
            <button class="btn-main" onclick="getDownloadLinks()">ለጥፍ</button>
        </div>

        <div id="loader" class="loader"></div>
        <div id="results"></div>
    </div>

    <div class="how-to">
        <h2 style="text-align: center;">እንዴት ማውረድ ይቻላል?</h2>
        <div class="grid">
            <div class="step-card">
                <i class="fas fa-link" style="color:var(--primary-blue); font-size: 20px;"></i>
                <p>1. ሊንኩን ኮፒ አድርጉ</p>
            </div>
            <div class="step-card">
                <i class="fas fa-paste" style="color:var(--primary-blue); font-size: 20px;"></i>
                <p>2. እዚህ ይለጥፉ</p>
            </div>
            <div class="step-card">
                <i class="fas fa-download" style="color:var(--primary-blue); font-size: 20px;"></i>
                <p>3. ያውርዱ</p>
            </div>
        </div>
    </div>

    <script>
        async function getDownloadLinks() {
            const url = document.getElementById('urlInput').value;
            const resultsDiv = document.getElementById('results');
            const loader = document.getElementById('loader');

            if (!url) {
                alert("እባክዎ ሊንክ ያስገቡ!");
                return;
            }

            resultsDiv.innerHTML = "";
            loader.style.display = "block";

            try {
                // Vercel relative path
                const response = await fetch(`/info?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                loader.style.display = "none";

                if (data.error) {
                    resultsDiv.innerHTML = `<p style="color:red">ስህተት ተከስቷል: ${data.error}</p>`;
                    return;
                }

                let html = `
                    <img src="${data.thumbnail}" class="thumbnail">
                    <p style="font-size:14px; margin-bottom:15px;">${data.title}</p>
                `;

                data.formats.forEach(f => {
                    // This matches the 'quality_label' from our api/index.py
                    html += `
                        <a href="${f.direct_url}" target="_blank" class="download-btn">
                            🎬 ${f.quality_label} አውርድ
                        </a>
                    `;
                });

                resultsDiv.innerHTML = html;

            } catch (err) {
                loader.style.display = "none";
                resultsDiv.innerHTML = "<p style='color:red'>ከሰርቨሩ ጋር መገናኘት አልተቻለም።</p>";
            }
        }
    </script>
</body>
</html>
