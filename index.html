<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YasinG Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #2d6df6; --bg: #0b0d11; --card: #16191f; }
        
        /* Force layout visibility */
        html, body { height: 100%; margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; }
        
        /* Navigation - Fixed across devices */
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #222; background: var(--bg); position: sticky; top: 0; z-index: 1000; }
        .logo { color: var(--blue); font-weight: 900; font-size: 22px; text-decoration: none; }
        .nav-links { display: flex; gap: 15px; }
        .nav-links a { color: #888; text-decoration: none; font-size: 13px; }

        /* Main Wrapper to prevent sections from disappearing */
        .wrapper { display: flex; flex-direction: column; min-height: 100vh; align-items: center; padding-bottom: 40px; }

        .container { width: 90%; max-width: 450px; margin-top: 30px; }

        /* The Card */
        .main-card { background: var(--card); border-radius: 24px; padding: 30px; text-align: center; border: 1px solid #222; width: 100%; box-sizing: border-box; }
        
        /* Input & Search Button Fix */
        .input-box { background: #1e222a; border-radius: 14px; display: flex; padding: 5px; margin: 20px 0; border: 1px solid #333; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; width: 100%; font-size: 14px; }
        .btn-search { background: var(--blue); border: none; color: white; padding: 10px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; white-space: nowrap; }

        /* Results & Video */
        .preview-box { width: 100%; border-radius: 15px; overflow: hidden; margin-top: 20px; display: none; }
        video { width: 100%; background: #000; display: block; }
        .dl-btn { display: block; background: #252a34; color: white; text-decoration: none; padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid #444; font-weight: bold; }

        /* Reset / Another Video */
        #resetArea { display: none; margin-top: 20px; }
        .btn-reset { background: none; border: 1px solid #333; color: #888; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; }

        /* Steps Section - Guaranteed Visibility */
        .steps { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 40px; width: 100%; }
        .step { background: var(--card); padding: 15px; border-radius: 18px; font-size: 11px; text-align: center; color: #aaa; border: 1px solid #222; }
        .step i { color: var(--blue); margin-bottom: 10px; font-size: 20px; display: block; }

        /* Footer & Social */
        .footer { margin-top: auto; padding: 40px 20px; text-align: center; width: 100%; border-top: 1px solid #222; }
        .socials { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .socials a { color: #666; font-size: 22px; transition: 0.3s; }
        .socials a:hover { color: var(--blue); }

        .loader { display: none; margin: 20px auto; border: 3px solid #333; border-top: 3px solid var(--blue); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="nav">
        <a href="/" class="logo">YasinG</a>
        <div class="nav-links">
            <a href="#">ዜናዎች</a>
            <a href="#">ጥያቄዎች</a>
        </div>
    </div>

    <div class="wrapper">
        <div class="container">
            <div class="main-card">
                <h2 style="font-size: 24px; margin-top: 0;">ቪዲዮ ማውረጃ</h2>
                
                <div class="input-box">
                    <input type="text" id="urlInput" placeholder="ሊንኩን እዚህ ያስገቡ..." onfocus="handleAutoPaste()">
                    <button class="btn-search" onclick="startDownload()">አውርድ</button>
                </div>

                <div id="loader" class="loader"></div>

                <div id="previewBox" class="preview-box">
                    <video id="videoPlayer" controls></video>
                </div>

                <div id="results"></div>

                <div id="resetArea">
                    <button class="btn-reset" onclick="location.reload()">🔄 ሌላ ቪዲዮ አውርድ</button>
                </div>
            </div>

            <div class="steps">
                <div class="step"><i class="fas fa-link"></i>ሊንክ ኮፒ</div>
                <div class="step"><i class="fas fa-paste"></i>እዚህ ለጥፍ</div>
                <div class="step"><i class="fas fa-download"></i>ቪዲዮውን አውርድ</div>
            </div>
        </div>

        <div class="footer">
            <div class="socials">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-telegram"></i></a>
                <a href="#"><i class="fab fa-tiktok"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div>
            <p style="font-size: 11px; color: #444;">© 2026 YasinG Downloader. All rights reserved.</p>
        </div>
    </div>

    <script>
        // Auto-paste logic when clicking the input box
        async function handleAutoPaste() {
            const input = document.getElementById('urlInput');
            if (!input.value) {
                try {
                    const text = await navigator.clipboard.readText();
                    if (text.includes('http')) {
                        input.value = text;
                    }
                } catch (err) {}
            }
        }

        async function startDownload() {
            const url = document.getElementById('urlInput').value;
            const results = document.getElementById('results');
            const loader = document.getElementById('loader');
            const preview = document.getElementById('previewBox');
            const player = document.getElementById('videoPlayer');
            const resetArea = document.getElementById('resetArea');

            if (!url) return;

            loader.style.display = "block";
            results.innerHTML = "";
            preview.style.display = "none";
            resetArea.style.display = "none";

            try {
                const res = await fetch(`/api/info?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                loader.style.display = "none";

                if (data.error) {
                    results.innerHTML = `<p style="color:red; font-size:13px;">${data.error}</p>`;
                    return;
                }

                // Setup Preview
                preview.style.display = "block";
                player.src = data.formats[0].url;
                player.poster = data.thumbnail;

                // Build Download Buttons
                let html = `<p style="margin:15px 0; font-size:12px; color:#888;">${data.title}</p>`;
                data.formats.forEach(f => {
                    html += `<a href="${f.url}" target="_blank" class="dl-btn">🎬 ${f.quality} አውርድ</a>`;
                });
                
                results.innerHTML = html;
                resetArea.style.display = "block";

            } catch (err) {
                loader.style.display = "none";
                results.innerHTML = "Error: Could not connect to server.";
            }
        }
    </script>
</body>
</html>
