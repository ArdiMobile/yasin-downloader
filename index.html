<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YasinG - Facebook Video Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #2d6df6; --dark: #1a1d23; --text: #333; }
        
        html, body { height: 100%; margin: 0; display: flex; flex-direction: column; }
        body { font-family: 'Inter', sans-serif; color: var(--text); background: white; scroll-behavior: smooth; }

        /* --- 1. NAVIGATION --- */
        .nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 8%; background: white; border-bottom: 1px solid rgba(0,0,0,0.05); 
            position: sticky; top: 0; z-index: 9999; width: 100%; box-sizing: border-box; 
        }
        .logo { font-size: 26px; font-weight: 900; color: var(--blue); text-decoration: none; }
        .nav-links { display: flex; gap: 25px; align-items: center; margin-left: auto; }
        .nav-links a { text-decoration: none; color: #444; font-size: 14px; font-weight: 600; }
        .menu-toggle { display: none; font-size: 22px; cursor: pointer; color: var(--dark); }

        /* --- 2. HERO & DOWNLOADER --- */
        .hero { 
            position: relative; padding: 100px 20px; text-align: center; 
            color: white; overflow: hidden; min-height: 450px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: var(--dark);
        }

        /* Hero Background with 70% Opacity */
        .hero::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('15840.jpg'); background-size: cover; background-position: center;
            opacity: 0.7; z-index: 1; 
            pointer-events: none; /* CRITICAL: Allows clicking the input box through the image */
        }

        .hero-content { position: relative; z-index: 10; max-width: 800px; width: 100%; }
        .hero h1 { font-size: 42px; margin-bottom: 15px; font-weight: 800; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        /* SEARCH AREA */
        .search-area { 
            max-width: 550px; margin: 0 auto; display: flex; background: white; 
            padding: 6px; border-radius: 50px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            align-items: center; width: 90%; position: relative; z-index: 100;
        }
        .search-area input { 
            flex: 1; border: none; padding: 15px 20px; outline: none; 
            font-size: 16px; border-radius: 50px; color: #333; background: transparent;
        }
        .btn-dl { 
            background: var(--blue); color: white; border: none; width: 50px; height: 50px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.3s; flex-shrink: 0; font-size: 18px;
        }

        /* --- 3. MOBILE MENU --- */
        @media (max-width: 850px) {
            .nav-links { 
                display: none; position: absolute; top: 100%; left: 0; width: 100%; 
                background: white; flex-direction: column; padding: 10px 0; 
                box-shadow: 0 10px 15px rgba(0,0,0,0.1); 
            }
            .nav-links.active { display: flex; }
            .menu-toggle { display: block; }
            .hero h1 { font-size: 32px; }
        }

        /* FAQ & UPDATES */
        .section { padding: 60px 8%; }
        .faq-item { background: white; border: 1px solid #eee; border-radius: 12px; margin-bottom: 10px; padding: 15px; cursor: pointer; }
        .faq-answer { max-height: 0; overflow: hidden; transition: 0.3s ease; color: #666; font-size: 14px; }
        .faq-item.active .faq-answer { max-height: 100px; margin-top: 10px; }
    </style>
</head>
<body>

    <nav class="nav">
        <a href="#" class="logo">YasinG</a>
        <div class="menu-toggle" id="menuBtn"><i class="fas fa-bars"></i></div>
        <div class="nav-links" id="navLinks">
            <a href="#how">How to Download</a>
            <a href="#faq">FAQs</a>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>Facebook Video Downloader</h1>
            <p>Paste link and download instantly.</p>
            <form class="search-area" id="dlForm">
                <input type="text" id="urlInput" placeholder="Paste video link here..." autocomplete="off">
                <button type="submit" class="btn-dl"><i class="fas fa-download"></i></button>
            </form>
        </div>
    </section>

    <section class="section" id="how">
        <h2 style="text-align:center;">Simple Steps</h2>
        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:20px;">
            <div style="background:#fafafa; padding:30px; border-radius:15px; text-align:center;">
                <i class="fas fa-link" style="color:var(--blue); font-size:30px;"></i>
                <h4>Copy URL</h4><p>Copy link from Facebook.</p>
            </div>
            <div style="background:#fafafa; padding:30px; border-radius:15px; text-align:center;">
                <i class="fas fa-paste" style="color:var(--blue); font-size:30px;"></i>
                <h4>Paste Here</h4><p>Paste into the search box.</p>
            </div>
        </div>
    </section>

    <script>
        // 1. MENU FIX
        document.getElementById('menuBtn').addEventListener('click', () => {
            document.getElementById('navLinks').classList.toggle('active');
        });

        // 2. AUTO-PASTE FIX
        const urlInput = document.getElementById('urlInput');
        urlInput.addEventListener('focus', async () => {
            try {
                const text = await navigator.clipboard.readText();
                if (text.startsWith('http')) { urlInput.value = text; }
            } catch (err) { console.log('Clipboard blocked'); }
        });

        // 3. DOWNLOAD ACTION FIX
        document.getElementById('dlForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const url = urlInput.value;
            if (!url) return alert("Please paste a link first!");
            alert("Fetching video from: " + url); // Confirmed working state
        });
    </script>
</body>
</html>
