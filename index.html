<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YasinG Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #2d6df6; --bg-main: #fcfcfc; --border: #e6e9ef; --text-dark: #333; }
        body { font-family: 'Inter', sans-serif; background: #fafafa; color: var(--text-dark); margin: 0; }

        /* --- 1. MODERN CLIPS-STYLE NAVIGATION --- */
        .nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; background: white; border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 2000;
        }
        .logo { color: var(--blue); font-weight: 800; font-size: 24px; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        
        .hamburger { font-size: 24px; cursor: pointer; background: none; border: none; padding: 0; }
        
        /* The Clips-Style Drawer Menu */
        .nav-menu { 
            display: none; flex-direction: column; position: fixed; top: 0; right: 0; width: 280px; height: 100vh; 
            background: white; z-index: 3000; box-shadow: -5px 0 15px rgba(0,0,0,0.1); border-left: 1px solid var(--border);
        }
        .nav-menu.active { display: flex; }
        
        /* Drawer Header */
        .drawer-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 25px; border-bottom: 1px solid var(--border); }
        .drawer-title { color: var(--blue); font-weight: 700; font-size: 18px; }
        .close-btn { background: none; border: none; font-size: 20px; color: var(--blue); cursor: pointer; }

        /* Drawer Links */
        .nav-menu a { 
            color: var(--text-dark); padding: 18px 25px; text-decoration: none; 
            font-size: 15px; border-bottom: 1px solid var(--border); transition: 0.3s;
        }
        .nav-menu a:hover { background: #f8f9fa; color: var(--blue); }

        /* Background Overlay when menu is open */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2500; }
        .overlay.active { display: block; }

        /* Main Container */
        .container { max-width: 450px; margin: 30px auto; padding: 0 15px; }
        .main-card { background: white; border-radius: 20px; padding: 25px; border: 1px solid var(--border); text-align: center; }

        /* --- 2. PERFECTLY FITTED DOWNLOAD BOX --- */
        .search-container { 
            background: white; border-radius: 50px; display: flex; padding: 5px; 
            margin: 25px 0; border: 1px solid var(--border); overflow: hidden; height: 50px;
        }
        .search-container input { 
            flex: 1; border: none; padding: 0 15px; outline: none; font-size: 14px; color: #555;
        }
        .btn-download-fit { 
            background: var(--blue); color: white; border: none; width: 60px; height: 50px; 
            border-radius: 0 50px 50px 0; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: -5px -5px -5px 0; /* Adjust fit */
        }
        .btn-download-fit i { font-size: 20px; }

        /* --- 3. THE LOADING SPINNER (Fixed) --- */
        #loader { display: none; margin: 20px auto; border: 3px solid #eee; border-top: 3px solid var(--blue); border-radius: 50%; width: 25px; height: 25px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Results & Video */
        .preview-box { width: 100%; border-radius: 15px; overflow: hidden; margin-top: 20px; display: none; border: 1px solid var(--border); }
        video { width: 100%; background: #000; display: block; }
        .info-badge { background: rgba(45, 109, 246, 0.1); border: 1px solid var(--blue); color: var(--blue); padding: 5px 12px; border-radius: 20px; font-size: 11px; display: inline-block; margin-top: 15px; font-weight: bold; }
        .dl-link { display: block; background: #22262e; color: white; text-decoration: none; padding: 15px; border-radius: 10px; margin-top: 10px; font-weight: bold; font-size: 14px; }

        /* Steps */
        .steps { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .step { background: white; padding: 20px; border-radius: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid var(--border); }
        .step i { color: var(--blue); font-size: 20px; width: 30px; text-align: center; }

        /* Footer */
        .footer { padding: 40px 15px; border-top: 1px solid var(--border); text-align: center; margin-top: 40px; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="nav">
        <a href="/" class="logo"><i class="fab fa-facebook"></i> YasinG</a>
        <button class="hamburger" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        
        <div class="nav-menu" id="navMenu">
            <div class="drawer-header">
                <span class="drawer-title">YasinG</span>
                <button class="close-btn" onclick="toggleMenu()"><i class="fas fa-arrow-left"></i></button>
            </div>
            <a href="#">እንዴት እንደሚሰራ</a>
            <a href="#">ዜናዎች</a>
            <a href="#">ጥያቄዎች</a>
            <a href="#" style="border-top: 10px solid #f8f9fa;">Login</a>
            <a href="#">Signup</a>
            <a href="#">Contact Us</a>
        </div>
    </nav>

    <div class="container">
        <div class="main-card">
            <h2 style="font-size: 22px; margin-top: 0;">ቪዲዮ ማውረጃ</h2>
            
            <div class="search-container">
                <input type="text" id="urlInput" placeholder="ቪዲዮ ሊንክ እዚህ ያስገቡ..." onfocus="autoPaste()">
                <button class="btn-download-fit" onclick="startDownload()">
                    <i class="fas fa-download"></i>
                </button>
            </div>

            <div id="loader"></div>

            <div id="previewBox" class="preview-box">
                <video id="videoPlayer" controls poster="poster_url_here"></video>
            </div>
            <div id="results"></div>
        </div>

        <div class="steps">
            <div class="step"><i class="fas fa-link"></i><span>ሊንኩን ኮፒ ያድርጉ</span></div>
            <div class="step"><i class="fas fa-paste"></i><span>እዚህ ይለጥፉ</span></div>
            <div class="step"><i class="fas fa-download"></i><span>ቪዲዮውን ያውርዱ</span></div>
        </div>
    </div>

    <div class="footer">
        © 2026 YasinG Downloader. All rights reserved.
    </div>

    <script>
        // 1. Clips-Style Drawer Menu Logic
        function toggleMenu() {
            document.getElementById('navMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        async function autoPaste() {
            try {
                const text = await navigator.clipboard.readText();
                if(text.includes('http')) document.getElementById('urlInput').value = text;
            } catch (e) {}
        }

        async function startDownload() {
            const url = document.getElementById('urlInput').value;
            const resArea = document.getElementById('results');
            const loader = document.getElementById('loader');
            const preview = document.getElementById('previewBox');
            if(!url) return;

            // 3. Show Loader Spinner
            loader.style.display = "block";
            resArea.innerHTML = "";
            preview.style.display = "none";

            try {
                const res = await fetch(`/api/info?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                
                // Hide Loader when data arrives
                loader.style.display = "none";

                if(data.error) { resArea.innerHTML=`<p style="color:red; font-size:12px">${data.error}</p>`; return; }

                preview.style.display = "block";
                document.getElementById('videoPlayer').src = data.formats[0].url;
                let html = `<div class="info-badge">Video by: ${data.uploader}</div><p style="font-size:12px; color:#999; margin:10px 0;">${data.title}</p>`;
                data.formats.forEach(f => {
                    html += `<a href="${f.url}" target="_blank" class="dl-link">Download ${f.quality}</a>`;
                });
                resArea.innerHTML = html;
            } catch(e) { loader.style.display="none"; resDiv.innerHTML="Server connection error."; }
        }
    </script>
</body>
</html>
