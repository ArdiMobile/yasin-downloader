<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YasinG - Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #2d6df6; --bg: #0b0d11; --card: #16191f; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* 2. Top Navigation & Dropdown */
        .nav { display: flex; justify-content: space-between; padding: 15px 20px; align-items: center; border-bottom: 1px solid #222; background: var(--bg); position: sticky; top: 0; z-index: 100; }
        .logo { color: var(--blue); font-weight: 900; font-size: 22px; text-decoration: none; }
        .menu-icon { font-size: 20px; cursor: pointer; color: #888; }
        .nav-menu { display: none; position: absolute; top: 60px; right: 20px; background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 10px; min-width: 150px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .nav-menu.active { display: block; }
        .nav-menu a { display: block; color: white; padding: 10px; text-decoration: none; font-size: 14px; border-bottom: 1px solid #222; }

        .container { flex: 1; max-width: 450px; margin: 0 auto; padding: 20px; width: 90%; }
        .main-card { background: var(--card); border-radius: 24px; padding: 25px; text-align: center; border: 1px solid #222; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        /* Input & Search Button Fix */
        .input-box { background: #1e222a; border-radius: 14px; display: flex; padding: 5px; margin: 20px 0; border: 1px solid #333; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; width: 60%; }
        .btn-action { background: var(--blue); border: none; color: white; padding: 10px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; display: flex; gap: 5px; }

        /* Play Button Color Fix */
        .preview-box { width: 100%; border-radius: 15px; overflow: hidden; margin-bottom: 20px; display: none; }
        video { width: 100%; background: #000; border-radius: 15px; }
        video::-webkit-media-controls-play-button { background-color: var(--blue); border-radius: 50%; }

        .dl-btn { display: block; background: #252a34; color: white; text-decoration: none; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #444; font-weight: bold; transition: 0.3s; }
        .dl-btn:hover { background: var(--blue); }

        /* Steps */
        .steps { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 30px; }
        .step { background: var(--card); padding: 12px; border-radius: 15px; font-size: 10px; text-align: center; color: #aaa; border: 1px solid #222; }
        .step i { color: var(--blue); margin-bottom: 8px; font-size: 16px; display: block; }

        /* 3. Reset Button */
        #resetBtn { display: none; margin-top: 15px; color: #888; font-size: 13px; cursor: pointer; background: none; border: none; width: 100%; }

        /* 4. Social Footer */
        .footer { text-align: center; padding: 30px; border-top: 1px solid #222; margin-top: auto; }
        .social-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .social-links a { color: #888; font-size: 20px; transition: 0.3s; }
        .social-links a:hover { color: var(--blue); }
        .copy-text { font-size: 11px; color: #555; }

        .loader { display: none; margin: 20px auto; border: 3px solid #333; border-top: 3px solid var(--blue); border-radius: 50%; width: 25px; height: 25px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="nav">
        <a href="/" class="logo">YasinG</a>
        <div class="menu-icon" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
        <div class="nav-menu" id="navMenu">
            <a href="#">እንዴት እንደሚሰራ</a>
            <a href="#">ዜናዎች</a>
            <a href="#">ስለ እኛ</a>
        </div>
    </div>

    <div class="container">
        <div class="main-card">
            <h2 style="font-size: 22px; margin-top: 0;">ቪዲዮ ማውረጃ</h2>
            <div class="input-box">
                <input type="text" id="urlInput" placeholder="ሊንኩን እዚህ ያስገቡ...">
                <button class="btn-action" onclick="startDownload()">
                    አውርድ
                </button>
            </div>

            <div id="loader" class="loader"></div>
            
            <div id="previewBox" class="preview-box">
                <video id="videoPlayer" controls></video>
            </div>

            <div id="results"></div>
            <button id="resetBtn" onclick="location.reload()">🔄 ሌላ ቪዲዮ አውርድ</button>
        </div>

        <div class="steps">
            <div class="step"><i class="fas fa-link"></i>ኮፒ</div>
            <div class="step"><i class="fas fa-paste"></i>ለጥፍ</div>
            <div class="step"><i class="fas fa-download"></i>አውርድ</div>
        </div>
    </div>

    <div class="footer">
        <div class="social-links">
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-telegram"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
            <a href="#"><i class="fab fa-tiktok"></i></a>
        </div>
        <div class="copy-text">© 2026 YasinG Downloader. All rights reserved.</div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('navMenu').classList.toggle('active');
        }

        async function startDownload() {
            const url = document.getElementById('urlInput').value;
            const results = document.getElementById('results');
            const loader = document.getElementById('loader');
            const preview = document.getElementById('previewBox');
            const player = document.getElementById('videoPlayer');
            const resetBtn = document.getElementById('resetBtn');

            if(!url) {
                // Auto-paste logic if empty
                try {
                    const text = await navigator.clipboard.readText();
                    if(text) document.getElementById('urlInput').value = text;
                } catch (e) {}
                return;
            }

            loader.style.display = "block";
            results.innerHTML = "";
            preview.style.display = "none";

            try {
                const res = await fetch(`/api/info?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                loader.style.display = "none";

                if(data.error) {
                    results.innerHTML = `<p style="color:red; font-size:12px;">${data.error}</p>`;
                    return;
                }

                preview.style.display = "block";
                player.src = data.formats[0].url;
                player.poster = data.thumbnail;

                let html = `<p style="margin:15px 0; font-size:12px; color:#aaa;">${data.title}</p>`;
                data.formats.forEach(f => {
                    html += `<a href="${f.url}" target="_blank" class="dl-btn">🎬 ${f.quality} አውርድ</a>`;
                });
                results.innerHTML = html;
                resetBtn.style.display = "block";
            } catch (err) {
                loader.style.display = "none";
                results.innerHTML = "Error connecting to server.";
            }
        }
    </script>
</body>
</html>
